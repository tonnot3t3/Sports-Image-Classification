name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # --------------------------------------------------------------------- #
  # 1. Run unit tests (preprocessing tests run unconditionally; HTTP/E2E
  #    tests skip cleanly when the ONNX model is not available).
  # --------------------------------------------------------------------- #
  test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install runtime + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx pillow

      - name: Run pytest
        run: pytest -q

  # --------------------------------------------------------------------- #
  # 2. Build the Docker image to validate the Dockerfile.
  # --------------------------------------------------------------------- #
  docker-build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: sports-vit-api:ci

  # --------------------------------------------------------------------- #
  # 3. Auto-deploy to Hugging Face Spaces on `main` when tests pass.
  # --------------------------------------------------------------------- #
  deploy:
    name: Deploy to Hugging Face Spaces
    runs-on: ubuntu-latest
    needs: [test, docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Configure Git LFS
        run: |
          git lfs install
          git lfs pull

      - name: Push to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        run: |
          set -euo pipefail
          if [ -z "${HF_TOKEN}" ] || [ -z "${HF_USERNAME}" ] || [ -z "${HF_SPACE_NAME}" ]; then
            echo "::error::HF_TOKEN, HF_USERNAME and HF_SPACE_NAME secrets must be set."
            exit 1
          fi

          git config --global user.email "ci@github.com"
          git config --global user.name  "GitHub Actions"

          REMOTE="https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE_NAME}"
          git remote add hf "${REMOTE}" || git remote set-url hf "${REMOTE}"

          # Force-push the current commit; HF Spaces always tracks main.
          git push --force hf HEAD:main
